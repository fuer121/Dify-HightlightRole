    - data:
        code: "\nimport json\n\ndef _as_dict(value):\n    return value if isinstance(value, dict) else {}\n\ndef _first_non_empty_list(*values):\n    for value in values:\n        if isinstance(value, list) and len(value) > 0:\n            return value\n    return []\n\ndef _normalize_detail(value):\n    if isinstance(value, list):\n        return '；'.join(json.dumps(item, ensure_ascii=False) if isinstance(item, (dict, list)) else str(item) for item in value)\n    if isinstance(value, dict):\n        return json.dumps(value, ensure_ascii=False)\n    return str(value)\n\ndef main(arg1: str, character_name: str, description: str):\n    json_arg = json.loads(arg1 or '{}')\n    data = _as_dict(json_arg)\n    output = _as_dict(data.get('output'))\n    result = _as_dict(data.get('result'))\n    payload = _as_dict(data.get('data'))\n    payload_output = _as_dict(payload.get('output'))\n    image_b64 = _first_non_empty_list(\n        output.get('images_b64'),\n        result.get('images_b64'),\n        data.get('images_b64'),\n        payload_output.get('images_b64'),\n        payload.get('images_b64')\n    )\n    if not image_b64:\n        detail = data.get('detail')\n        if detail is not None:\n            raise ValueError(f\"立绘生成接口返回错误：{_normalize_detail(detail)}\")\n        raise ValueError(f\"未找到 images_b64，可用顶层字段: {list(data.keys())}\")\n    first_image = str(image_b64[0]).strip()\n    if not first_image:\n        raise ValueError('images_b64 为空')\n    mime_type = 'image/png'\n    markdown_image = f\"![角色立绘](data:{mime_type};base64,{first_image})\"\n    return {\n        'character_name': character_name,\n        'description': description,\n        'result': first_image,\n        'markdown_output': markdown_image\n    }\n"
