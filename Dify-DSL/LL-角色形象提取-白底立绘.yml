    - data:
        code: "import json\n\ndef main(text: str, paragraph_image_url: str, role_name: str):\n    content = (text or '').strip()\n    lines = [line.strip() for line in content.splitlines() if line.strip()]\n    character_name = role_name.strip() or '主要人物'\n    description = ''\n\n    for line in lines:\n        if line.startswith('角色:'):\n            value = line.split(':', 1)[1].strip()\n            if value:\n                character_name = value\n        elif line.startswith('描述:'):\n            value = line.split(':', 1)[1].strip()\n            if value:\n                description = value\n\n    if not description:\n        description = (\n            f'参考段落图片中 {character_name} 的核心外观特征重新绘制角色设定立绘，非抠图、非裁切、非复刻原场景，'\n            '保留人物五官气质、发型、服饰结构和重要配饰，生成单人纯白背景全身或大半身设定图，人物居中完整，边缘干净，'\n            '不要原图背景、复杂光影、剧情动作、多人、文字水印。'\n        )\n\n    final_prompt = description\n    payload = {\n        'app_id': 'img2img-gen',\n        'inputs': {\n            'prompt': final_prompt,\n            'neg_prompt': '抠图, 裁切原图, 直接提取原图人物, 复刻原场景, 原图背景, 复杂背景, 场景光影, 水面, 山谷, 建筑, 多人, 群像, 杂乱道具, 文字, 水印, 模糊, 低清晰度, 裁切, 残缺肢体, 多余手指, 黑色背景, 灰色背景, 彩色背景',\n            'ref_image_urls': paragraph_image_url,\n            'width': '768',\n            'height': '1024',\n            'num_images_per_prompt': '1',\n            'quality': 'medium',\n            'output_format': 'jpeg',\n            'gen_user': 'system',\n            'output_compression': 50,\n            'image_gen_timeout': '360'\n        },\n        'stream': False\n    }\n\n    return {\n        'character_name': character_name,\n        'description': description,\n        'request_body': json.dumps(payload, ensure_ascii=False)\n    }\n"
