    - data:
        code: |
          import json
          import re

          def _extract_json(text):
              raw = (text or '').strip()
              if raw.startswith('```'):
                  raw = re.sub(r'^```(?:json)?\s*', '', raw)
                  raw = re.sub(r'\s*```$', '', raw)
              try:
                  return json.loads(raw)
              except Exception:
                  match = re.search(r'\{[\s\S]*\}', raw)
                  if match:
                      try:
                          return json.loads(match.group(0))
                      except Exception:
                          return {}
              return {}

          def _to_int(value, default=1):
              try:
                  number = int(float(str(value).strip()))
                  return max(1, min(10, number))
              except Exception:
                  return default

          def _score_from_text(text):
              match = re.search(r'综合评分[：:]\s*(\d+)', text or '')
              if match:
                  return _to_int(match.group(1), 1)
              match = re.search(r'"score"\s*:\s*(\d+)', text or '')
              if match:
                  return _to_int(match.group(1), 1)
              return 1

          def _recommendation(score):
              if score >= 9:
                  return '强烈推荐'
              if score >= 7:
                  return '推荐'
              if score >= 4:
                  return '一般'
              return '不推荐'

          def _as_list(value):
              if isinstance(value, list):
                  return [str(item).strip() for item in value if str(item).strip()]
              if isinstance(value, str):
                  text = value.strip()
                  if not text or text == '无':
                      return []
                  return [item.strip() for item in re.split(r'[,，、\n]', text) if item.strip()]
              return []

          def _normalize_image_value(value, score, recommendation, text):
              value_text = str(value or '').strip()
              if value_text in ('有价值', '无价值'):
                  return value_text
              if '无价值' in value_text:
                  return '无价值'
              if '有价值' in value_text:
                  return '有价值'
              if '不推荐' in str(recommendation or ''):
                  return '无价值'
              if '强烈推荐' in str(recommendation or '') or str(recommendation or '').strip() == '推荐':
                  return '有价值'
              if '不推荐' in (text or ''):
                  return '无价值'
              return '有价值' if score >= 7 else '无价值'

          def main(arg1: str):
              raw_text = (arg1 or '').strip()
              data = _extract_json(raw_text)
              score = _to_int(data.get('score'), _score_from_text(raw_text))
              recommendation = str(data.get('recommendation') or _recommendation(score)).strip()
              if recommendation not in ('强烈推荐', '推荐', '一般', '不推荐'):
                  recommendation = _recommendation(score)
              image_value = _normalize_image_value(data.get('image_value'), score, recommendation, raw_text)
              is_valid = 1 if image_value == '有价值' else 0
              visual_elements = _as_list(data.get('visual_elements'))
              non_visual_elements = _as_list(data.get('non_visual_elements'))
              reason = str(data.get('reason') or '').strip()
              calibration_note = str(data.get('calibration_note') or '').strip()

              report = {
                  'score': score,
                  'image_value': image_value,
                  'recommendation': recommendation,
                  'visual_elements': visual_elements,
                  'non_visual_elements': non_visual_elements,
                  'reason': reason,
                  'calibration_note': calibration_note
              }

              return {
                  'is_valid': is_valid,
                  'score': score,
                  'image_value': image_value,
                  'recommendation': recommendation,
                  'visual_elements': visual_elements,
                  'non_visual_elements': non_visual_elements,
                  'reason': reason,
                  'calibration_note': calibration_note,
                  'judgment_report': json.dumps(report, ensure_ascii=False),
                  'raw_text': raw_text
              }
        code_language: python3
