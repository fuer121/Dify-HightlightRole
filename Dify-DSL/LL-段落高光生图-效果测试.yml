    - data:
        code: "from __future__ import annotations\n\nimport re\nfrom typing import\
          \ Optional, Tuple, Dict\nimport requests\nimport ast\n\nbase_url='https://cdn-wtzw-com.oss-cn-beijing.aliyuncs.com/highlight_gen_pic/role_pic/'\n\
          _CONTENT_RANGE_RE = re.compile(r\"^bytes\\s+(\\d+)-(\\d+)/(\\d+|\\*)$\"\
          , re.IGNORECASE)\n\ndef url_exists_by_range(\n    url: str,\n    timeout:\
          \ float = 5.0,\n    allow_redirects: bool = True,\n    headers: Optional[Dict[str,\
          \ str]] = None,\n    session: Optional[requests.Session] = None,\n) -> bool:\n\
          \    \"\"\"\n    模拟：\n      curl -L --max-time 5 -H \"Range: bytes=0-0\"\
          \ -o /dev/null -s -D - <url>\n\n    返回：(exists, status_code, resp_headers,\
          \ reason)\n    \"\"\"\n    s = session or requests.Session()\n\n    h =\
          \ {\n        \"Range\": \"bytes=0-0\",\n        \"User-Agent\": \"url-checker/1.0\"\
          ,\n        \"Accept\": \"*/*\",\n    }\n    if headers:\n        h.update(headers)\n\
          \n    try:\n        # stream=True：避免 requests 预读更多内容\n        r = s.get(url,\
          \ headers=h, timeout=timeout, allow_redirects=allow_redirects, stream=True)\n\
          \        status = r.status_code\n        resp_headers = {k: v for k, v in\
          \ r.headers.items()}\n\n        # 1) 最理想：206 + Content-Range: bytes 0-0/total\n\
          \        if status == 206:\n            cr = r.headers.get(\"Content-Range\"\
          , \"\")\n            m = _CONTENT_RANGE_RE.match(cr.strip())\n         \
          \   if not m:\n                return False\n            start, end, total\
          \ = m.group(1), m.group(2), m.group(3)\n            if start != \"0\" or\
          \ end != \"0\":\n                return False\n            if total.isdigit()\
          \ and int(total) > 0:\n                return True\n            # total\
          \ 可能是 '*'，此时也可认为存在\n            if total == \"*\":\n                return\
          \ True\n            return False\n\n        # 2) 服务器忽略 Range 也可能返回 200（仍然算存在）\n\
          \        if status == 200:\n            return True\n\n        # 3) 常见“存在但不支持\
          \ Range”返回 416（需要进一步降级普通 GET/HEAD 才能确认）\n        if status == 416:\n   \
          \         return False\n\n        # 4) 其它状态一般认为不存在/不可访问（403 可能是防盗链/鉴权，不等于不存在）\n\
          \        return False\n\n    except requests.RequestException as e:\n  \
          \      return False\n    finally:\n        try:\n            r.close() \
          \ # type: ignore[name-defined]\n        except Exception:\n            pass\n\
          def main(book_id: int, role_title: str, describe: str, chapter: int):\n\
          \    role_base_url = 'https://cdn-wtzw-com.oss-cn-beijing.aliyuncs.com/highlight_gen_pic/book_info/'\n\
          \    h = {\n        \"User-Agent\": \"url-checker/1.0\",\n        \"Accept\"\
          : \"*/*\",\n    }\n    role_list = []\n    title =''\n    pattern = r\"\
          角色:(?P<role>.+)\\s*标题:(?P<title>.+)\"\n    match = re.search(pattern, role_title)\n\
          \    if match:\n        title = match.group(\"title\")\n        role_list\
          \ = (match.group(\"role\")).split(',')\n    # if len(role_title.split('\\\
          n'))>1:\n    #     temp = role_title.split('\\n')\n    #     if len(temp[0].split(':'))>1:\n\
          \    #         role_list = temp[0].split(':')[1].split(',')\n        # if\
          \ len(temp[1].split(':'))>1:\n        #     title = temp[1].split(':')[1]\n\
          \    \n    role_url_describe=''\n    url_str = ''\n    role_url = []\n \
          \   role_valid = []\n    role_info = ''\n    role_have_pic_list = []\n \
          \   role_have_pic = ''\n    s = requests.Session()\n    if len(role_list)>0:\n\
          \        i = 0\n        for index, value in  enumerate(role_list):\n   \
          \         path = base_url+str(book_id)+'_'+value+'.png'\n            role_path\
          \ = role_base_url + str(book_id) + '_role.txt'\n            if url_exists_by_range(path):\n\
          \                i += 1\n                role_url.append(path)\n       \
          \         role_valid.append('第'+str(i)+'张图是'+value)\n                role_have_pic_list.append(value)\n\
          \            role_have_pic = ','.join(role_have_pic_list)\n            if\
          \ url_exists_by_range(role_path):\n                response = s.get(role_path,\
          \ headers=h, timeout=10, allow_redirects=True, stream=True)\n          \
          \      if response.status_code == 200:\n                    response.encoding\
          \ = 'utf-8'\n                    for line in response.iter_lines(decode_unicode=True):\n\
          \                        if line:\n                            parts = line.split('\\\
          t')\n                            if len(parts) != 2:\n                 \
          \               continue\n                            chapter_sort, info\
          \ = parts\n                            if int(chapter_sort) == chapter:\n\
          \                                data_dict = ast.literal_eval(info)\n  \
          \                              role_info = role_info + value + '(' + '年龄'+data_dict.get(value,{}).get('age','未知')\
          \ +',性别'+ data_dict.get(value,{}).get('gender','未知')+','+data_dict.get(value,{}).get('appearance','未知')+');'\n\
          \                \n    if len(role_url)>0:\n        url_str = '\\n'.join(role_url)\n\
          \        role_url_describe = ';'.join(role_valid)\n    lines = describe.splitlines()\n\
          \    #lines.insert(1,\"人物基本信息: \"+ role_info)\n    #describe = \"\\n\".join(lines)\n\
          \    if role_have_pic == '':\n        prompt = '请根据如下小说场景描述生成一张高质量小说插画。'+\
          \ '\\n' + describe\n    else:\n        prompt = '请根据如下小说场景与角色参考图生成一张高质量小说插画。'\
          \ + '\\n' +'\\n'+ describe + '\\n 【角色参考图规则】\\n' +role_url_describe + '\\\
          n请严格保持'+role_have_pic +'的人脸特征、发型、五官、气质、角色身份一致性，如果生图描述中没有服装的描述，服装也完全继承底图\
          \ \\n 但不要直接复用原图构图、姿势、背景与镜头。\\n 除'+role_have_pic+'外，其余角色请根据文字描述重新生成。不要参考底图的外观特征，但需要参考风格\\\
          n'\n        #prompt='请根据如下小说场景与角色参考图生成一张高质量小说插画。' + '\\n' +'\\n'+ describe\
          \ + '【角色参考图规则】\\n' +role_url_describe + '\\n请严格保持'+role_have_pic +'的人脸特征、发型、五官、气质、角色身份一致性\
          \ \\n 但不要直接复用原图构图、姿势、背景与镜头。\\n 除'+role_have_pic+'外，其余角色请根据文字描述重新生成。不要参考底图的外观特征，但需要参考风格\\\
          n'\n\n\n\n\n\n    return {\n        \"role_url\": url_str,\n        \"role_list\"\
          : role_list,\n        \"prompt\": prompt,\n        \"highlight_content\"\
          : title\n    }"
