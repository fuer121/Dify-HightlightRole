    - data:
        code: "from __future__ import annotations\n\nimport re\nfrom typing import\
          \ Optional, Tuple, Dict\nimport requests\n\nbase_url='https://cdn-wtzw-com.oss-cn-beijing.aliyuncs.com/highlight_gen_pic/book_info/'\n\
          _CONTENT_RANGE_RE = re.compile(r\"^bytes\\s+(\\d+)-(\\d+)/(\\d+|\\*)$\"\
          , re.IGNORECASE)\n\ndef url_exists_by_range(\n    url: str,\n    timeout:\
          \ float = 5.0,\n    allow_redirects: bool = True,\n    headers: Optional[Dict[str,\
          \ str]] = None,\n    session: Optional[requests.Session] = None,\n) -> bool:\n\
          \    \"\"\"\n    模拟：\n      curl -L --max-time 5 -H \"Range: bytes=0-0\"\
          \ -o /dev/null -s -D - <url>\n\n    返回：(exists, status_code, resp_headers,\
          \ reason)\n    \"\"\"\n    s = session or requests.Session()\n\n    h =\
          \ {\n        \"Range\": \"bytes=0-0\",\n        \"User-Agent\": \"url-checker/1.0\"\
          ,\n        \"Accept\": \"*/*\",\n    }\n    if headers:\n        h.update(headers)\n\
          \n    try:\n        # stream=True：避免 requests 预读更多内容\n        r = s.get(url,\
          \ headers=h, timeout=timeout, allow_redirects=allow_redirects, stream=True)\n\
          \        status = r.status_code\n        resp_headers = {k: v for k, v in\
          \ r.headers.items()}\n\n        # 1) 最理想：206 + Content-Range: bytes 0-0/total\n\
          \        if status == 206:\n            cr = r.headers.get(\"Content-Range\"\
          , \"\")\n            m = _CONTENT_RANGE_RE.match(cr.strip())\n         \
          \   if not m:\n                return False\n            start, end, total\
          \ = m.group(1), m.group(2), m.group(3)\n            if start != \"0\" or\
          \ end != \"0\":\n                return False\n            if total.isdigit()\
          \ and int(total) > 0:\n                return True\n            # total\
          \ 可能是 '*'，此时也可认为存在\n            if total == \"*\":\n                return\
          \ True\n            return False\n\n        # 2) 服务器忽略 Range 也可能返回 200（仍然算存在）\n\
          \        if status == 200:\n            return True\n\n        # 3) 常见“存在但不支持\
          \ Range”返回 416（需要进一步降级普通 GET/HEAD 才能确认）\n        if status == 416:\n   \
          \         return False\n\n        # 4) 其它状态一般认为不存在/不可访问（403 可能是防盗链/鉴权，不等于不存在）\n\
          \        return False\n\n    except requests.RequestException as e:\n  \
          \      return False\n    finally:\n        try:\n            r.close() \
          \ # type: ignore[name-defined]\n        except Exception:\n            pass\n\
          def main(book_id: int):\n    h = {\n        \"User-Agent\": \"url-checker/1.0\"\
          ,\n        \"Accept\": \"*/*\",\n    }\n\n    url = base_url+'book_'+str(book_id)+'_info.txt'\n\
          \    s = requests.Session()\n    des = ''\n    response = s.get(url, headers=h,\
          \ timeout=10, allow_redirects=True, stream=True)\n    if(url_exists_by_range(url)):\n\
          \        if response.status_code == 200:\n            response.encoding\
          \ = 'utf-8'  \n            des = response.text\n\n    return {\n       \
          \ \"book_des\": des\n    }"
